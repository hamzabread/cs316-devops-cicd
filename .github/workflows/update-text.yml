name: Update File and Create PR

on:
  worflow_dispatch: 

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update text.txt
        run: echo "Updated on $(date)" >> text.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update text.txt"
          branch: featured-branch
          base: main 
          title: "Automated Update to text.txt"
          body: "This PR was automatically generated by Github Actions"
